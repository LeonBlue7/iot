# IoT 管理系统 - CI/CD 流水线

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ====================
  # 后端测试
  # ====================
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run lint
        working-directory: ./backend
        run: npm run lint

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run tests with coverage
        working-directory: ./backend
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/coverage-summary.json
          flags: backend

      - name: Build
        working-directory: ./backend
        run: npm run build

  # ====================
  # 小程序测试
  # ====================
  miniprogram-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miniprogram/package-lock.json

      - name: Install dependencies
        working-directory: ./miniprogram
        run: npm ci

      - name: Run tests with coverage
        working-directory: ./miniprogram
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./miniprogram/coverage/coverage-summary.json
          flags: miniprogram

  # ====================
  # Docker 构建（仅 main 分支）
  # ====================
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, miniprogram-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/iot-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/iot-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/iot-backend:buildcache,mode=max

  # ====================
  # 部署到服务器（仅 main 分支）
  # ====================
  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/iot
            git pull origin main
            docker-compose pull
            docker-compose up -d
            docker system prune -f
