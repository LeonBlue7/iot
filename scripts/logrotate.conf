# IoT 管理系统日志轮转配置
# 安装：sudo cp logrotate.conf /etc/logrotate.d/iot-system
# 测试：sudo logrotate -d /etc/logrotate.d/iot-system

/opt/iot/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 root root
    sharedscripts
    postrotate
        # 如果使用 PM2 管理进程，重新加载以刷新日志
        if [ -f /usr/bin/pm2 ]; then
            pm2 reload all --update-env >/dev/null 2>&1 || true
        fi
    endscript
}

/opt/iot/backend/logs/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 0640 nodejs nodejs
}

/opt/iot/nginx/logs/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        # 重新加载 Nginx 以刷新日志文件
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 `cat /var/run/nginx.pid`
        fi
    endscript
}
