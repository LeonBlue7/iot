## EMQX 配置文件
## 物联网 MQTT Broker 配置

## 监听器配置
## MQTT TCP 端口
listeners.tcp.default.bind = 1883

## MQTT WebSocket 端口
listeners.ws.default.bind = 8083

## 认证配置 - 允许匿名访问（设备通过 IMEI 认证）
authentication = []

## 消息日志
log.level = info

## Dashboard 配置
dashboard.listeners.http.bind = 18083

## 系统主题
broker.sys_topic_interval = 30s