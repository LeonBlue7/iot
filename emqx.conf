## EMQX 5.x 配置文件

## 节点配置（必填）
node {
  name = "emqx@127.0.0.1"
  cookie = "iot_emqx_secret_cookie_2026"
  data_dir = "data"
}

## 集群配置
cluster {
  name = iot-cluster
  discovery_strategy = manual
}

## MQTT TCP 监听器
listeners.tcp.default {
  bind = 1883
  max_connections = 102400
}

## MQTT WebSocket 监听器
listeners.ws.default {
  bind = 8083
  max_connections = 102400
}

## Dashboard 配置
dashboard {
  listeners.http.bind = 18083
  default_username = admin
  default_password = public
}

## 日志配置
log.level = info

## 匿名访问允许
allow_anonymous = true