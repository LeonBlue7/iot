## EMQX 配置文件
## 物联网 MQTT Broker 配置

## 监听器配置
## MQTT TCP 端口
listener.tcp.default.bind = 1883

## MQTT WebSocket 端口
listener.ws.default.bind = 8083

## MQTT SSL 端口
listener.ssl.default.bind = 8883
listener.ssl.default.ssl_options.certfile = /etc/emqx/certs/fullchain.pem
listener.ssl.default.ssl_options.keyfile = /etc/emqx/certs/privkey.pem

## MQTT over WebSocket SSL 端口
listener.wss.default.bind = 8084
listener.wss.default.ssl_options.certfile = /etc/emqx/certs/fullchain.pem
listener.wss.default.ssl_options.keyfile = /etc/emqx/certs/privkey.pem

## 认证配置 - 匿名访问（设备通过 IMEI 认证）
authentication.anonymous.enabled = true

## 消息日志
log.level = info
log.file.handler.default.level = info

## 集群配置
cluster.name = iot-cluster
cluster.discovery_strategy = manual

## Dashboard 配置
dashboard.listeners.http.bind = 18083
dashboard.default_username = admin
dashboard.default_password = public

## ACL 配置 - 允许所有主题
authorization.sources = file
authorization.file.path = etc/acl.conf

## 消息保留
retainer.retain.message.max_payload_size = 256KB
retainer.retain.message.max_count = 1000

## 系统主题
broker.sys_topic_interval = 30s
