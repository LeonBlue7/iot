version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: iot-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-iot_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iot_password}
      POSTGRES_DB: ${DB_NAME:-iot_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iot_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: iot-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network

  # EMQX MQTT Broker
  emqx:
    image: emqx/emqx:5.0.22
    container_name: iot-emqx
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_USERNAME:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_PASSWORD:-public}
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
      - ./emqx.conf:/opt/emqx/etc/emqx.conf:ro
    ports:
      - "1883:1883"      # MQTT TCP
      - "8083:8083"      # MQTT WebSocket
      - "8084:8084"      # MQTT SSL
      - "8883:8883"      # MQTT TCP SSL
      - "18083:18083"    # Dashboard
    networks:
      - iot-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-iot_user}:${DB_PASSWORD:-iot_password}@postgres:5432/${DB_NAME:-iot_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      MQTT_BROKER_URL: mqtt://emqx:1883
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_started
    volumes:
      - ./backend/.env:/app/.env:ro
    networks:
      - iot-network
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: iot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - iot-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  emqx_data:
    driver: local
  emqx_log:
    driver: local

networks:
  iot-network:
    driver: bridge
