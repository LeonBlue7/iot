# Docker Compose 开发环境配置
# 完全容器化开发环境，一键启动所有服务
# 生产环境请使用 docker-compose.prod.yml

services:
  # ====================
  # 基础设施服务
  # ====================

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: iot-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USER:-iot_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-iot_password}
      POSTGRES_DB: ${DB_NAME:-iot_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iot_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-dev-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: iot-redis-dev
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-dev-network
    restart: unless-stopped

  # EMQX MQTT Broker
  emqx:
    image: emqx/emqx:5.0.22
    container_name: iot-emqx-dev
    environment:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_NODE__COOKIE: iot_emqx_secret_dev
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_USERNAME:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_PASSWORD:-public}
      EMQX_LISTENERS__TCP__DEFAULT__BIND: 1883
      EMQX_LISTENERS__WS__DEFAULT__BIND: 8083
      # 开发环境允许匿名连接（简化调试）
      EMQX_ALLOW_ANONYMOUS: "true"
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    ports:
      - "1883:1883"      # MQTT TCP
      - "8083:8083"      # MQTT WebSocket
      - "18083:18083"    # Dashboard
    networks:
      - iot-dev-network
    restart: unless-stopped

  # ====================
  # 应用服务 (开发模式)
  # ====================

  # 后端服务 - 开发模式
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: iot-backend-dev
    environment:
      NODE_ENV: development
      # Docker 网络中使用服务名
      DATABASE_URL: postgresql://${DB_USER:-iot_user}:${DB_PASSWORD:-iot_password}@postgres:5432/${DB_NAME:-iot_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      MQTT_BROKER_URL: mqtt://emqx:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      MQTT_CLIENT_ID: iot_server_dev_
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_in_production}
      JWT_EXPIRES_IN: 7d
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
    volumes:
      # 挂载源代码支持热重载
      - ./backend/src:/app/src:delegated
      - ./backend/prisma:/app/prisma:delegated
      # 排除 node_modules，使用容器内的
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_started
    networks:
      - iot-dev-network
    restart: unless-stopped

  # 管理后台前端 - 开发模式
  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile.dev
    container_name: iot-admin-web-dev
    volumes:
      # 挂载源代码支持 HMR
      - ./admin-web/src:/app/src:delegated
      - ./admin-web/public:/app/public:delegated
      # 挂载配置文件
      - ./admin-web/index.html:/app/index.html:delegated
      - ./admin-web/tsconfig.json:/app/tsconfig.json:delegated
      - ./admin-web/tsconfig.node.json:/app/tsconfig.node.json:delegated
      # 使用 Docker 环境的 vite 配置
      - ./admin-web/vite.config.docker.ts:/app/vite.config.ts:delegated
      # 排除 node_modules
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - iot-dev-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  emqx_data:
  emqx_log:

networks:
  iot-dev-network:
    driver: bridge
